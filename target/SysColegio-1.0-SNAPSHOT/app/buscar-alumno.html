<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar Alumno</title>
</head>
<body>
    <div class="title">
        <h2>Buscar alumno</h2>
        <input type="text" id="dni" placeholder="Ingrese su dni">
        <button id="search">Buscar</button>
        <br>
        <p id="mensaje"></p>
    </div>
    <div class="content">
        <table border="1" id="table-alumnos">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Correo</th>
                    <th>Celular</th>
                    <th>Sexo</th>
                </tr>
            </thead>
            <tbody id="table-body-alumno"></tbody>
        </table>
    </div>
    <script type="module" src="../js/main.js"></script>
</body>
</html>
